<!DOCTYPE html>
<html>
<head>
  <title>whgct.shop</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    .spacer {
      height: 300px; /* 约等于空20行 */
    }

    h1 {
      font-size: 40px;
    }

    .banner {
      margin: 20px 0;
    }

    .banner img {
      width: 80%;
      max-width: 800px;
      height: auto;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 28px;
      color: white;
      background-color: red;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn:hover {
      background-color: darkred;
    }
  </style>
</head>

<body>

  <!-- 页面顶部空白 -->
  <div class="spacer"></div>

  <!-- 标题 -->
  <h1>A variety of jerseys for you to choose from</h1>

  <!-- 图片（可点击跳转） -->
  <div class="banner">
    <a href="https://whgct01.com/">
      <img src="8.jpg" alt="Promo Banner">
    </a>
  </div>

  <!-- 按钮 -->
  <a href="https://whgct01.com/" class="btn">
    Buy it now
  </a>

</body>
</html>
